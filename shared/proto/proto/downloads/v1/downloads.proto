syntax = "proto3";

package downloads.v1;

import "common/v1/common.proto";

service DownloadService {
  rpc RequestDownload(DownloadRequest) returns (DownloadResponse);
  rpc ValidateDownloadUrl(ValidateUrlRequest) returns (ValidateUrlResponse);
}

message DownloadRequest {
  string track_id = 1;
  string user_id = 2;
  string format = 3;
}

message DownloadResponse {
  string download_url = 1;
  int64 expires_in = 2;
  string filename = 3;
  int64 file_size = 4;
}

message ValidateUrlRequest {
  string url = 1;
  string signature = 2;
}

message ValidateUrlResponse {
  bool valid = 1;
  string track_id = 2;
  string user_id = 3;
}
