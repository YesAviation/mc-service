syntax = "proto3";

package analytics.v1;

import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";

service AnalyticsService {
  rpc RecordEvent(RecordEventRequest) returns (common.v1.Empty);
  rpc GetPlaybackStats(GetPlaybackStatsRequest) returns (PlaybackStatsResponse);
  rpc GetTopTracks(GetTopTracksRequest) returns (TopTracksResponse);
  rpc GetListeningHistory(GetListeningHistoryRequest) returns (ListeningHistoryResponse);
}

message RecordEventRequest {
  string user_id = 1;
  string event_type = 2;
  string track_id = 3;
  string payload_json = 4;
}

message GetPlaybackStatsRequest {
  string user_id = 1;
  google.protobuf.Timestamp from = 2;
  google.protobuf.Timestamp to = 3;
}

message PlaybackStatsResponse {
  int64 total_plays = 1;
  int64 total_listen_time_secs = 2;
  int32 unique_tracks = 3;
  int32 unique_artists = 4;
}

message GetTopTracksRequest {
  string user_id = 1;
  int32 limit = 2;
  google.protobuf.Timestamp from = 3;
  google.protobuf.Timestamp to = 4;
}

message TopTracksResponse {
  repeated TopTrack tracks = 1;
}

message TopTrack {
  string track_id = 1;
  int64 play_count = 2;
  int64 total_listen_time_secs = 3;
}

message GetListeningHistoryRequest {
  string user_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message ListeningHistoryResponse {
  repeated ListeningHistoryEntry entries = 1;
  common.v1.PaginationResponse pagination = 2;
}

message ListeningHistoryEntry {
  string track_id = 1;
  google.protobuf.Timestamp played_at = 2;
  int32 duration_listened_secs = 3;
}
