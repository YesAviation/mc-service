syntax = "proto3";

package playlist.v1;

import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";

service PlaylistService {
  rpc CreatePlaylist(CreatePlaylistRequest) returns (Playlist);
  rpc GetPlaylist(GetPlaylistRequest) returns (Playlist);
  rpc ListPlaylists(ListPlaylistsRequest) returns (ListPlaylistsResponse);
  rpc UpdatePlaylist(UpdatePlaylistRequest) returns (Playlist);
  rpc DeletePlaylist(DeletePlaylistRequest) returns (common.v1.Empty);
  rpc AddTrack(AddTrackRequest) returns (Playlist);
  rpc RemoveTrack(RemoveTrackRequest) returns (Playlist);
  rpc ReorderTracks(ReorderTracksRequest) returns (Playlist);
}

message Playlist {
  string id = 1;
  string name = 2;
  string user_id = 3;
  string description = 4;
  bool is_public = 5;
  repeated PlaylistTrack tracks = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message PlaylistTrack {
  string track_id = 1;
  int32 position = 2;
  google.protobuf.Timestamp added_at = 3;
}

message CreatePlaylistRequest {
  string user_id = 1;
  string name = 2;
  string description = 3;
  bool is_public = 4;
}

message GetPlaylistRequest {
  string playlist_id = 1;
}

message ListPlaylistsRequest {
  string user_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message ListPlaylistsResponse {
  repeated Playlist playlists = 1;
  common.v1.PaginationResponse pagination = 2;
}

message UpdatePlaylistRequest {
  string playlist_id = 1;
  optional string name = 2;
  optional string description = 3;
  optional bool is_public = 4;
}

message DeletePlaylistRequest {
  string playlist_id = 1;
}

message AddTrackRequest {
  string playlist_id = 1;
  string track_id = 2;
}

message RemoveTrackRequest {
  string playlist_id = 1;
  string track_id = 2;
}

message ReorderTracksRequest {
  string playlist_id = 1;
  repeated string track_ids = 2;
}
