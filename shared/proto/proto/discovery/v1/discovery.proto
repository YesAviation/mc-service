syntax = "proto3";

package discovery.v1;

import "common/v1/common.proto";

service DiscoveryService {
  rpc GetTrending(GetTrendingRequest) returns (DiscoveryResponse);
  rpc GetRecentlyAdded(GetRecentlyAddedRequest) returns (DiscoveryResponse);
  rpc GetForYou(GetForYouRequest) returns (DiscoveryResponse);
  rpc GetSimilarTracks(GetSimilarTracksRequest) returns (DiscoveryResponse);
}

message GetTrendingRequest {
  int32 limit = 1;
  optional string genre = 2;
}

message GetRecentlyAddedRequest {
  int32 limit = 1;
}

message GetForYouRequest {
  string user_id = 1;
  int32 limit = 2;
}

message GetSimilarTracksRequest {
  string track_id = 1;
  int32 limit = 2;
}

message DiscoveryResponse {
  repeated DiscoveryItem items = 1;
}

message DiscoveryItem {
  string track_id = 1;
  string title = 2;
  string artist_id = 3;
  string artist_name = 4;
  string album_id = 5;
  string album_title = 6;
  float score = 7;
  string source = 8;
}
