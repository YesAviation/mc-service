syntax = "proto3";

package notification.v1;

import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";

service NotificationService {
  rpc SendNotification(SendNotificationRequest) returns (NotificationResponse);
  rpc GetNotifications(GetNotificationsRequest) returns (GetNotificationsResponse);
  rpc MarkAsRead(MarkAsReadRequest) returns (common.v1.Empty);
  rpc Subscribe(SubscribeRequest) returns (stream NotificationEvent);
}

message SendNotificationRequest {
  string user_id = 1;
  string notification_type = 2;
  string title = 3;
  string body = 4;
  string payload_json = 5;
}

message NotificationResponse {
  string notification_id = 1;
}

message GetNotificationsRequest {
  string user_id = 1;
  common.v1.PaginationRequest pagination = 2;
  optional bool unread_only = 3;
}

message GetNotificationsResponse {
  repeated Notification notifications = 1;
  common.v1.PaginationResponse pagination = 2;
}

message Notification {
  string id = 1;
  string user_id = 2;
  string notification_type = 3;
  string title = 4;
  string body = 5;
  bool read = 6;
  string payload_json = 7;
  google.protobuf.Timestamp created_at = 8;
}

message MarkAsReadRequest {
  repeated string notification_ids = 1;
}

message SubscribeRequest {
  string user_id = 1;
}

message NotificationEvent {
  Notification notification = 1;
}
