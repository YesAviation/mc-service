syntax = "proto3";

package common.v1;

import "google/protobuf/timestamp.proto";

message PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message PaginationResponse {
  int32 total_items = 1;
  int32 total_pages = 2;
  int32 current_page = 3;
  int32 page_size = 4;
}

message Empty {}

message ErrorDetail {
  string code = 1;
  string message = 2;
  map<string, string> metadata = 3;
}
